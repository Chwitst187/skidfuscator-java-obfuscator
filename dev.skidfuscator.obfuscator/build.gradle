plugins {
    id 'java'
    id 'xyz.wagyourtail.jvmdowngrader' version '1.2.1'
}

repositories {
    mavenCentral()
    maven { url 'https://jitpack.io' }
}

configurations {
    testCompile.extendsFrom compileOnly
}

dependencies {
    testCompileOnly 'org.projectlombok:lombok:1.18.46'
    compileOnly 'org.projectlombok:lombok:1.18.46'

    api project(':commons')
    api project(':pure-analysis')

    implementation project(':sdk')
    implementation 'com.github.lukfor:magic-progress:0.3.2'
    implementation("org.piwik.java.tracking:matomo-java-tracker:3.4.0")

    api 'com.github.Col-E:jphantom:1.4.3'
    implementation 'dev.dirs:directories:26'
    implementation 'de.femtopedia.dex2jar:dex2jar:2.4.24'
    implementation 'org.apache.commons:commons-compress:1.24.0'

    testAnnotationProcessor 'org.projectlombok:lombok:1.18.46'
    implementation 'org.fusesource.jansi:jansi:2.4.0'
    implementation 'org.yaml:snakeyaml:1.33'

    testImplementation 'org.mockito:mockito-core:4.2.0'
    testImplementation 'org.junit.jupiter:junit-jupiter-api:5.9.0'
    testImplementation 'org.junit.jupiter:junit-jupiter-params:5.9.0'
    testRuntimeOnly 'org.junit.jupiter:junit-jupiter-engine:5.9.0'
}


jar {
    into('resources') {
        from project(':sdk').tasks.jar.archiveFile
        rename { String filename ->
            'sdk.jar'
        }
    }
}

// Add SDK jar to test resources
processTestResources {
    from(project(':sdk').tasks.jar.archiveFile) {
        into 'resources'
        rename { String filename ->
            'sdk.jar'
        }
    }
}

test {
    useJUnitPlatform()
}

configurations {
    downgrade
    implementation.extendsFrom downgrade
}

downgradeJar {
    downgradeTo = JavaVersion.VERSION_1_8
}
def generatedJasmTestClasses = layout.buildDirectory.dir('generated/classes/jasm/test')
def generateJasmTestClasses = tasks.register('generateJasmTestClasses') {
    outputs.dir(generatedJasmTestClasses)

    doLast {
        def outputFile = generatedJasmTestClasses.get()
                .file('dev/skidfuscator/testclasses/stack/Dup2_X1.class')
                .asFile
        outputFile.parentFile.mkdirs()
        outputFile.bytes = createDup2X1Class()
    }
}

sourceSets {
    test {
        output.dir(generatedJasmTestClasses, builtBy: generateJasmTestClasses)
    }
}

tasks.named('compileTestJava') {
    dependsOn generateJasmTestClasses
    classpath += files(generatedJasmTestClasses)
}

static byte[] createDup2X1Class() {
    def bytes = new ByteArrayOutputStream()
    def out = new DataOutputStream(bytes)

    def utf8 = { String value -> out.writeByte(1); out.writeUTF(value) }
    def clazz = { int nameIndex -> out.writeByte(7); out.writeShort(nameIndex) }
    def string = { int utf8Index -> out.writeByte(8); out.writeShort(utf8Index) }
    def nameAndType = { int nameIndex, int descIndex -> out.writeByte(12); out.writeShort(nameIndex); out.writeShort(descIndex) }
    def methodRef = { int classIndex, int nameAndTypeIndex -> out.writeByte(10); out.writeShort(classIndex); out.writeShort(nameAndTypeIndex) }

    out.writeInt((int) 0xCAFEBABE)
    out.writeShort(0)
    out.writeShort(52)
    out.writeShort(47)
    utf8('dev/skidfuscator/testclasses/stack/Dup2_X1')
